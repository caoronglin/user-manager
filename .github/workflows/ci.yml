name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@v2
        with:
          ignore_paths: >-
            Miniforge.sh
            data/
            logs/
            templates/
          ignore_names: regenerate_password_pool.sh
          severity: error

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq rsnapshot ufw htop
          # Mock commands for testing
          sudo ln -sf /bin/true /usr/local/bin/setquota
          sudo ln -sf /bin/true /usr/local/bin/repquota
      
      - name: Run Test Framework
        run: |
          chmod +x tests/*.sh
          bash tests/test_framework.sh || echo "Tests pending implementation"
      
      - name: Validate Shell Syntax
        run: |
          for file in *.sh lib/*.sh scripts/*.sh; do
            if [[ -f "$file" ]]; then
              bash -n "$file" || exit 1
            fi
          done

  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check README exists
        run: |
          test -f README.md || exit 1
          grep -q "Quick Start\|快速开始" README.md || echo "Warning: README missing Quick Start section"
          grep -q "Installation\|安装" README.md || echo "Warning: README missing Installation section"
      
      - name: Check AGENTS.md exists
        run: test -f AGENTS.md || exit 1

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check for sensitive files
        run: |
          ! git ls-files | grep -E "password_pool\.txt|email_config\.json|user_config\.json" || {
            echo "Error: Sensitive files should not be committed"
            exit 1
          }
      
      - name: Check file permissions
        run: |
          # Ensure scripts are executable
          for file in *.sh lib/*.sh scripts/*.sh; do
            if [[ -f "$file" ]] && [[ ! -x "$file" ]]; then
              echo "Warning: $file is not executable"
            fi
          done
